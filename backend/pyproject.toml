[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=app --cov-report=term-missing --cov-fail-under=60 -v"
log_cli = true
log_cli_level = "INFO"

[tool.coverage.run]
omit = [
    "app/eval/*",          # requires real API + ingested data to run
    "app/agent/orchestrator.py",  # requires real Claude API
]